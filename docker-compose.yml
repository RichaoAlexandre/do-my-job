services:
  frontend:
    build: ./server
    ports:
      - "5174:5174"
    environment:
      - VITE_WS_URL=ws://backend:3001/ws
    depends_on:
      - backend
    networks:
      - do-my-job-net

  backend:
    build: ./backend
    ports:
      - "3001:3001"
    env_file: .env
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    networks:
      - do-my-job-net

  agent:
    build: ./agent
    image: do-my-job-agent
    profiles:
      - build-only
    networks:
      - do-my-job-net

networks:
  do-my-job-net:
    name: do-my-job-net
